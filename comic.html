<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業三昧　マニュアル漫画</title>
<style>
  :root {
    --navy: #1B2A4A;
    --blue: #2E86DE;
    --gold: #E8A020;
    --bg: #0F1626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    height: 100%;
    font-family: "Meiryo UI", "游ゴシック", "Yu Gothic", sans-serif;
    overflow: hidden;
  }
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    background: var(--navy);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 10;
  }
  .topbar a.back {
    color: #B8D4F0; text-decoration: none;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 4px;
  }
  .topbar a.back:hover { color: #fff; }
  .topbar .title {
    color: #fff; font-size: 15px; font-weight: 800;
    flex: 1; text-align: center;
  }
  .topbar .page-indicator {
    color: var(--gold); font-size: 14px; font-weight: 700;
    min-width: 56px; text-align: right;
  }

  .viewer {
    position: fixed;
    top: 56px; bottom: 64px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    touch-action: pan-y;
  }
  .track {
    display: flex;
    height: 100%;
    transition: transform .35s ease;
  }
  .page {
    flex: 0 0 auto;
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
  }
  .page img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    user-select: none;
    -webkit-user-drag: none;
  }

  .nav-btn {
    position: fixed;
    top: 56px; bottom: 64px;
    width: 64px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,.35);
    font-size: 32px;
    cursor: pointer;
    z-index: 5;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .nav-btn:hover { color: #fff; background: rgba(255,255,255,.06); }
  .nav-btn.prev { left: 0; }
  .nav-btn.next { right: 0; }
  .nav-btn:disabled { opacity: 0; pointer-events: none; }

  .bottombar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 64px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    z-index: 10;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background .15s, transform .15s;
  }
  .dot:hover { background: rgba(255,255,255,.5); }
  .dot.active { background: var(--gold); transform: scale(1.3); }

  @media (max-width: 640px) {
    .topbar .title { font-size: 13px; }
    .nav-btn { width: 44px; font-size: 24px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="index.html">← マニュアルに戻る</a>
  <div class="title">授業三昧　マニュアル漫画</div>
  <div class="page-indicator"><span id="pageNum">1</span> / 8</div>
</div>

<div class="viewer" id="viewer">
  <div class="track" id="track">
    <div class="page"><img src="comic/page1.png" alt="1ページ目" draggable="false"></div>
    <div class="page"><img src="comic/page2.png" alt="2ページ目" draggable="false"></div>
    <div class="page"><img src="comic/page3.png" alt="3ページ目" draggable="false"></div>
    <div class="page"><img src="comic/page4.png" alt="4ページ目" draggable="false"></div>
    <div class="page"><img src="comic/page5.png" alt="5ページ目" draggable="false"></div>
    <div class="page"><img src="comic/page6.png" alt="6ページ目" draggable="false"></div>
    <div class="page"><img src="comic/page7.png" alt="7ページ目" draggable="false"></div>
    <div class="page"><img src="comic/page8.png" alt="8ページ目" draggable="false"></div>
  </div>
</div>

<button class="nav-btn prev" id="prevBtn" aria-label="前のページ">‹</button>
<button class="nav-btn next" id="nextBtn" aria-label="次のページ">›</button>

<div class="bottombar" id="dots"></div>

<script>
  const total = 8;
  let current = 0;
  const track = document.getElementById('track');
  const pageNum = document.getElementById('pageNum');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const dotsWrap = document.getElementById('dots');
  const viewer = document.getElementById('viewer');

  for (let i = 0; i < total; i++) {
    const dot = document.createElement('button');
    dot.className = 'dot';
    dot.setAttribute('aria-label', (i + 1) + 'ページ目へ');
    dot.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(dot);
  }
  const dots = Array.from(dotsWrap.children);
  const pages = Array.from(document.querySelectorAll('.page'));

  function layout() {
    const w = viewer.clientWidth;
    pages.forEach(p => { p.style.width = w + 'px'; });
    track.style.transition = 'none';
    track.style.transform = `translateX(${-current * w}px)`;
    // re-enable transition on next frame
    requestAnimationFrame(() => { track.style.transition = ''; });
  }

  function render() {
    const w = viewer.clientWidth;
    track.style.transform = `translateX(${-current * w}px)`;
    pageNum.textContent = current + 1;
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
  }
  function goTo(i) {
    current = Math.max(0, Math.min(total - 1, i));
    render();
  }

  window.addEventListener('resize', layout);
  window.addEventListener('orientationchange', layout);
  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // swipe support
  let touchStartX = null;
  viewer.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  viewer.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) goTo(current + 1);
      else goTo(current - 1);
    }
    touchStartX = null;
  });

  layout();
  render();
</script>

</body>
</html>
